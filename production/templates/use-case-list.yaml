# software use case
# Use cases: The ultimate guide - https://medium.com/@60949161/use-cases-to-model-processes-1fb77d4efb30

---

use-case:
  id: UC-001
  title: User Login
  actor: Registered User
  description: A user logs in using valid credentials.
  pre-conditions:
    - User is on the login page
    - User has an active account
  main-flow:
    - 1. User enters username
    - 2. User enters password
    - 3. User clicks "Login"
    - 4. System validates credentials
    - 5. System redirects to homepage
  alternate-flow:
    - step: 1
      description: User request login creation, system system redirects to create credentials
  exception-flow:
    - step: 4
      description: Invalid password, system displays error
  post-conditions:
    - User is logged in
    - Session is created
