# software feature definition

---

features:
  - id: FEAT-001
    title: User Authentication
    description: Allow users to log in using OAuth2.
    priority: High                     # options: High, Medium, Low
    status: Backlog                    # options: Backlog, In Progress, Done
    owner: Dev Team A
    estimates:
      points: 5
      hours: 12
    acceptance_criteria:
      - User can login with Google
      - User can login with GitHub
      - Error message on wrong password
    tags: [security, auth]

  - id: FEAT-002
    title: Dashboard Export
    description: Export dashboard data to CSV
    priority: Medium                   # options: High, Medium, Low
    status: Backlog                    # options: Backlog, In Progress, Done
    owner: Dev Team B
    acceptance_criteria:
      - Button exists on dashboard
      - CSV includes user, action, and timestamp
    tags: [reporting, ui]

  - id: FEAT-003
    title: Google Sheets data repository
    description: Application data will be held in a Google Sheets repository for reporting of results
    priority: High
    status: Backlog
    owner: jeff
    acceptance_criteria:
      - automatic loading of data gathered from Slack bot
      - ability for user to create all standard reports
      - ability for user to create a manual report
    tags: [reporting, data-store, phase-1]

  - id: FEAT-004
    title: Agentic user (Claude) has an account on Slack
    description: Claude agent can dialog with Slack users and perform tasks for the volunteer tracking feature
    priority: High
    status: Backlog
    owner: jeff
    acceptance_criteria:
      - Claude is the agentic user
      - Agent can give instructions on how to use the volunteer opportunities feature
    tags: [agency, slack, phase-2]

  - id: FEAT-005
    title: Sign-Up Sheet Generation Tools
    description: >
      Two Python scripts (generate-signup-sheet-template.py, signup-sheet.py) convert
      YAML task data into printable HTML sign-up sheets with QR code placeholders.
      Used for trial with stewards/members before automation is built.
    priority: High
    status: Done
    owner: jeff
    acceptance_criteria:
      - generate-signup-sheet-template.py generates a reusable Jinja2 HTML template
      - signup-sheet.py renders template + YAML to HTML with embedded QR codes
      - QR codes use https://makersmiths.org as placeholder URL
      - Handles both metalshop-volunteer-opportunity.yaml and MSL-volunteer-opportunities.yaml formats
      - 24 tests passing
    tags: [phase-0, tooling, print]
