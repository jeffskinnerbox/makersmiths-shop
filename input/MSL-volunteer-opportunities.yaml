#   Data Model
#      shop --------> area --------> location --------> work_tasks --------> task
#
#   Examples
#       MSL, MSP    Main Floor,     Leatherworking Shop,   Dust & Wipe Down Machines
#                   Basement,       Downstairs Bathroom,
#                   Outside, etc.   Garden Area, etc.
#
# TESTING
#    YAML linter to spot syntax errors
#        yamllint input/MSL-volunteer-opportunities.yaml
#
#    # format MSL-volunteer-opportunities.yaml into a markdown file
#    python3 scripts/parse-tasks.py input/MSL-volunteer-opportunities.yaml output/MSL-volunteer-opportunities.md
#
#    # convert markdown file to MS Word .docx
#    pandoc -f gfm output/MSL-volunteer-opportunities.md -o output/MSL-volunteer-opportunities.docx
#
#    # convert yaml format to json format
#    python3 scripts/yaml-to-json.py input/MSL-volunteer-opportunities.yaml | jq -C '.'

