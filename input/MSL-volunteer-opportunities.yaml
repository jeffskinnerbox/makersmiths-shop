# Maintainer:   jeffskinnerbox@yahoo.com / www.jeffskinnerbox.me
# Version:      0.0.0
#
# DESCRIPTION
#   loosely follows this diagram: https://makersmiths.org/locations/leesburg
#                                https://makersmiths.org/locations/purcellville
#
#   Data Model
#      shop --------> area --------> location --------> work_tasks --------> task
#
#   Examples
#       MSL, MSP    Main Level,     Leatherworking Shop,   Dust & Wipe Down Machines
#                   Basement,       Downstairs Bathroom,
#                   Outside, etc.   Garden Area, etc.
#
# TESTING
#   Generate Jinja2 template (run once; output is reusable)
#       scripts/generate-signup-sheet-template.py --output output/signup-sheet-template.html.j2
#
#   YAML linter to spot syntax errors
#       yamllint input/MSL-volunteer-opportunities.yaml
#
#   Convert yaml format to json format
#       scripts/yaml-to-json.py input/MSL-volunteer-opportunities.yaml | jq -C '.'
#
#   Generate HTML sign-up sheet from Jinja2 template + YAML
#       scripts/signup-sheet.py --template output/signup-sheet-template.html.j2 --yaml input/MSL-volunteer-opportunities.yaml --output output/MSL-signup-sheet.html
#
#   View the rendered HTML sign-up sheet in your browser
#       file:///home/jeff/src/projects/makersmiths/shop-sergeant/output/MSL-signup-sheet.html
#
#   Render HTML sign-up sheet as a PDF file
#       wkhtmltopdf --orientation Landscape output/MSL-signup-sheet.html output/MSL-signup-sheet.pdf
#
#   View the rendered HTML sign-up sheet as a PDF file
#       xdg-open output/MSL-signup-sheet.pdf
#
# CLEAN-UP
#   Run this command to re-initialized everything
#       scripts/clean-up.sh
#
# PRINT SIGNUP SHEET 
#   To print the signup sheet in PDF format for all these location, use the following
#       scripts/generate-signup-sheet-template.py --output output/signup-sheet-template.html.j2
#       scripts/signup-sheet.py --template output/signup-sheet-template.html.j2 --yaml input/MSL-volunteer-opportunities.yaml --output output/MSL-signup-sheet.html
#       wkhtmltopdf --orientation Landscape output/MSL-signup-sheet.html output/MSL-signup-sheet.pdf
#       xdg-open output/MSL-signup-sheet.pdf

