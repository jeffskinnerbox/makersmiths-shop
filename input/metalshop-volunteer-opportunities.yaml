# Maintainer:   jeffskinnerbox@yahoo.com / www.jeffskinnerbox.me
# Version:      0.0.0
#
# DESCRIPTION
#   loosely follows this diagram: https://makersmiths.org/locations/leesburg
#                                 https://makersmiths.org/locations/purcellville
#
#   Data Model
#      shop --------> area --------> location --------> work_tasks --------> task
#
#   Examples
#       MSL, MSP    Main Floor,     Leatherworking Shop,   Dust & Wipe Down Machines
#                   Basement,       Downstairs Bathroom,
#                   Outside, etc.   Garden Area, etc.
#
# TESTING
#   Generate Jinja2 template (run once; output is reusable)
#       scripts/signup-sheet-template.py --output output/signup-sheet-template.html.j2
#
#   YAML linter to spot syntax errors
#       yamllint input/metalshop-volunteer-opportunities.yaml
#
#   convert yaml format to json format
#       scripts/yaml-to-json.py input/metalshop-volunteer-opportunities.yaml | jq -C '.'
#
#   Generate HTML sign-up sheet from Jinja2 template + YAML
#       scripts/signup-sheet.py --template output/signup-sheet-template.html.j2 --yaml input/metalshop-volunteer-opportunities.yaml --output output/metalshop-signup-sheet.html
#
#   View the rendered HTML sign-up sheet in your browser
#       file:///home/jeff/src/projects/makersmiths/shop-sergeant/output/metalshop-signup-sheet.html
#
#   Render HTML sign-up sheet as a PDF file
#       wkhtmltopdf --orientation Landscape output/metalshop-signup-sheet.html output/metalshop-signup-sheet.pdf
#
#   View the rendered HTML sign-up sheet as a PDF file
#       xdg-open output/metalshop-signup-sheet.pdf
#
# CLEAN-UP
#   Run this command to re-initialized everything
#       trash output/*.{html,j2}
#

---

opportunities:
  shop:
    name: Makersmiths Leesburg (MSL)
    address: 106 Royal St SW, Leesburg, VA 20175
    steward: John Carter
    area:
      - name: Main Level
        location:
          - name: Metalshop
            steward: Brad Hess
            work_tasks:
              - task: Dust & Wipe Down Machine
                task_id: MSL-METAL-001
                frequency: Weekly
                purpose: Keep shop clean, safe, and easy for all to use
                instructions: Do not use any cleaning solvant. Just a dry or damp cloth should be used.
                supervision: false
                last_date: NA

              - task: Clear Off & Organize Tabletops
                task_id: MSL-METAL-002
                frequency: Daily
                purpose: Keep the work area as open & free of object for safety
                instructions: NA
                supervision: false
                last_date: NA

              - task: Remove Anything That is Not CNC and Put Away
                task_id: MSL-METAL-003
                frequency: Daily
                purpose: Keep the work area as open & free of object for safety
                instructions: Every CNC / Big Red thing has its place, so place it there.
                supervision: false
                last_date: NA

              - task: Vaccum Floor
                task_id: MSL-METAL-004
                frequency: Daily
                purpose: Keeping the floor clean is important for safety
                instructions: NA
                supervision: false
                last_date: NA

              - task: Check Dust Collection and Empty if Needed
                task_id: MSL-METAL-005
                frequency: Weekly
                purpose: Keep shop clean, safe, and easy for all to use.
                instructions: Pull the handle on the left side and remove the basket.  Dump its contents in the dumpster in the back of the building.
                supervision: true
                last_date: NA

              - task: Empty Shop Vac
                task_id: MSL-METAL-006
                frequency: Bi-Weekly
                purpose: As the Vac fills up, it losses power and not nearly as effective when clean.
                instructions: Dump its contents in the dumpster in the back of the building.
                supervision: false
                last_date: NA

              - task: Empty Saw Dust
                task_id: MSL-METAL-007
                frequency: Bi-Weekly
                purpose: This helps keep the machine from clogging up while in use.
                instructions: On the front of the machine, remove the small basket and put in the dumpster.
                supervision: true
                last_date: NA

              - task: Test Case - removed all data

              - task: Test Case - forcing a new page
